<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FakeLag — Key System</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #08090e;
      --card: rgba(13, 15, 24, 0.8);
      --accent: #ff8c00;
      --text: #f0ede8;
      --muted: #6b6560;
      --red: #ff3b30;
      --border: rgba(255, 140, 0, 0.15);
      --gold: #ffd700;
      --green: #30d158;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* Hiệu ứng nền */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: -1;
      background-image: 
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(255,140,0,0.07), transparent),
        repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,140,0,0.03) 39px, rgba(255,140,0,0.03) 40px);
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 36px 32px;
      position: relative;
      overflow: hidden;
    }

    .card::after {
      content: '';
      position: absolute; left: 0; right: 0; height: 1px; top: 0;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      animation: scan 5s ease-in-out infinite;
    }

    @keyframes scan { 0% { transform: translateY(-100%); opacity: 0; } 50% { opacity: 1; } 100% { transform: translateY(800%); opacity: 0; } }

    .header { text-align: center; margin-bottom: 32px; }
    .logo {
      font-family: 'Share Tech Mono', monospace;
      font-size: 2rem;
      color: var(--text);
      letter-spacing: 4px;
      text-transform: uppercase;
    }
    .logo em { font-style: normal; color: var(--accent); }
    .tagline { font-size: 0.7rem; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; font-family: 'Share Tech Mono', monospace; margin-top: 8px; }

    .sec-label {
      font-size: 0.65rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 12px;
      font-family: 'Share Tech Mono', monospace;
      display: block;
    }

    .key-type-selector {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 28px;
    }

    .key-type-card {
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 18px 10px;
      cursor: pointer;
      transition: 0.2s;
      text-align: center;
    }

    .key-type-card.active {
      border-color: var(--accent);
      background: rgba(255, 140, 0, 0.08);
    }

    .key-type-card .type-hours {
      font-family: 'Share Tech Mono', monospace;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--muted);
    }

    .key-type-card.active .type-hours { color: var(--accent); }

    .key-type-card .type-meta {
      font-size: 0.6rem;
      color: var(--muted);
      margin-top: 6px;
      font-family: 'Share Tech Mono', monospace;
    }

    .divider { height: 1px; background: linear-gradient(90deg, var(--accent), transparent); margin: 24px 0; opacity: 0.2; }

    .btn-gen {
      width: 100%;
      padding: 16px;
      border: 1px solid var(--accent);
      border-radius: 4px;
      background: transparent;
      color: var(--accent);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 3px;
      cursor: pointer;
      transition: 0.2s;
      text-transform: uppercase;
    }

    .btn-gen:hover:not(:disabled) {
      background: var(--accent);
      color: #000;
      box-shadow: 0 0 20px rgba(255, 140, 0, 0.2);
    }

    .btn-gen:disabled { opacity: 0.3; cursor: not-allowed; }

    .btn-spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid currentColor; border-top-color: transparent;
      border-radius: 50%; animation: spin 0.6s linear infinite;
      margin-right: 8px; vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .message-box {
      margin-top: 20px;
      padding: 14px;
      border-radius: 4px;
      font-size: 0.8rem;
      font-family: 'Share Tech Mono', monospace;
      display: none;
      line-height: 1.4;
    }

    .message-box.error { background: rgba(255, 59, 48, 0.1); border: 1px solid rgba(255, 59, 48, 0.3); color: var(--red); }
    .message-box.success { background: rgba(48, 209, 88, 0.1); border: 1px solid rgba(48, 209, 88, 0.3); color: var(--green); }
    .message-box.show { display: block; animation: fadeIn 0.3s ease; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>

<body>
  <div class="card">
    <div class="header">
      <div class="logo">Fake<em>Lag</em></div>
      <div class="tagline">// authorized access only</div>
    </div>

    <span class="sec-label">> Chọn loại key</span>
    <div class="key-type-selector">
      <div class="key-type-card active" id="card12h" onclick="selectType(12)">
        <div class="type-hours">12H</div>
        <div class="type-meta">1 NHIỆM VỤ</div>
      </div>
      <div class="key-type-card" id="card24h" onclick="selectType(24)">
        <div class="type-hours">24H</div>
        <div class="type-meta">2 NHIỆM VỤ</div>
      </div>
    </div>

    <div class="divider"></div>

    <button class="btn-gen" id="btnGen" onclick="handleGenerate()">
      <span id="btnText">[ GENERATE KEY ]</span>
    </button>

    <div class="message-box" id="messageBox"></div>
  </div>

  <script>
    let selectedHours = 12;

    function selectType(hours) {
      selectedHours = hours;
      document.getElementById('card12h').classList.toggle('active', hours === 12);
      document.getElementById('card24h').classList.toggle('active', hours === 24);
      hideMsg();
    }

    async function handleGenerate() {
      const btn = document.getElementById('btnGen');
      const btnText = document.getElementById('btnText');
      
      // Reset state
      btn.disabled = true;
      btnText.innerHTML = '<span class="btn-spinner"></span> PROCESSING...';
      hideMsg();

      try {
        // Gửi request POST lên API của bạn
        const res = await fetch("/api/generate", {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ hours: selectedHours })
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.message || "Lỗi máy chủ không xác định");
        }

        if (data.success && data.url) {
          showMsg(`✅ Thành công! Đang chuyển hướng đến link nhiệm vụ...`, 'success');
          // Chờ 1.5 giây để user thấy thông báo rồi mới nhảy link
          setTimeout(() => {
            window.location.href = data.url;
          }, 1500);
        } else {
          throw new Error("Không nhận được link rút gọn.");
        }

      } catch (err) {
        showMsg("ERR // " + err.message, 'error');
        btn.disabled = false;
        btnText.textContent = '[ GENERATE KEY ]';
      }
    }

    function showMsg(msg, type) {
      const box = document.getElementById('messageBox');
      box.textContent = msg;
      box.className = `message-box ${type} show`;
    }

    function hideMsg() {
      document.getElementById('messageBox').className = 'message-box';
    }
  </script>
</body>
</html>
