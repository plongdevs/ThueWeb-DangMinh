<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FakeLag — Key System</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #08090e;
    --panel:   #0d0f18;
    --border:  rgba(255,140,0,0.15);
    --accent:  #ff8c00;
    --accent2: #ffb347;
    --dim:     rgba(255,140,0,0.08);
    --text:    #f0ede8;
    --muted:   #6b6560;
    --red:     #ff3b30;
    --green:   #30d158;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -20%, rgba(255,140,0,0.07), transparent),
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,140,0,0.03) 39px, rgba(255,140,0,0.03) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,140,0,0.03) 39px, rgba(255,140,0,0.03) 40px);
    pointer-events: none;
  }

  .wrap {
    position: relative; z-index: 1;
    width: 100%; max-width: 400px;
  }

  .wrap::before, .wrap::after, .corner-br, .corner-tl-inner {
    content: '';
    position: absolute;
    width: 18px; height: 18px;
    border-color: var(--accent);
    border-style: solid;
    opacity: 0.6;
    z-index: 2;
    pointer-events: none;
  }
  .wrap::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
  .wrap::after  { top: -1px; right: -1px; border-width: 2px 2px 0 0; }
  .corner-br    { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }
  .corner-bl    { content: ''; position: absolute; bottom: -1px; left: -1px;
                  width: 18px; height: 18px; border: 2px solid var(--accent);
                  border-width: 0 0 2px 2px; opacity: 0.6; z-index: 2; pointer-events: none; }

  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 36px 32px 32px;
    position: relative;
    overflow: hidden;
    animation: fadeIn 0.5s ease forwards;
  }

  @keyframes scan {
    0%   { transform: translateY(-100%); opacity: 0; }
    20%  { opacity: 1; }
    80%  { opacity: 1; }
    100% { transform: translateY(700%); opacity: 0; }
  }
  .card::after {
    content: '';
    position: absolute; left: 0; right: 0;
    height: 1px; top: 0;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    animation: scan 5s ease-in-out infinite;
    pointer-events: none;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .header { margin-bottom: 32px; }
  .sys-tag {
    font-family: 'Fira Code', monospace;
    font-size: 0.6rem;
    color: var(--accent);
    letter-spacing: 3px;
    text-transform: uppercase;
    opacity: 0.7;
    display: block;
    margin-bottom: 6px;
  }
  .logo { font-size: 2.2rem; font-weight: 700; letter-spacing: 2px; color: var(--text); line-height: 1; }
  .logo em { font-style: normal; color: var(--accent); }
  .tagline { font-family: 'Fira Code', monospace; font-size: 0.62rem; color: var(--muted); margin-top: 8px; letter-spacing: 1px; }

  .div { height: 1px; background: linear-gradient(90deg, var(--accent), transparent); margin: 24px 0; opacity: 0.25; }

  .label { font-family: 'Fira Code', monospace; font-size: 0.6rem; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 12px; display: block; }

  .key-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 28px; }

  .key-opt {
    border: 1px solid rgba(255,140,0,0.15);
    border-radius: 4px;
    padding: 18px 14px;
    cursor: pointer;
    transition: all 0.2s;
    background: transparent;
    text-align: center;
    user-select: none;
    position: relative;
    overflow: hidden;
  }
  .key-opt::before { content: ''; position: absolute; inset: 0; background: var(--accent); opacity: 0; transition: opacity 0.2s; }
  .key-opt:hover::before { opacity: 0.04; }
  .key-opt.active { border-color: var(--accent); background: var(--dim); }
  .key-opt.active::before { opacity: 0.06; }

  .key-opt .hours { font-family: 'Fira Code', monospace; font-size: 1.9rem; font-weight: 600; color: var(--muted); line-height: 1; transition: color 0.2s; position: relative; z-index: 1; }
  .key-opt.active .hours { color: var(--accent); text-shadow: 0 0 20px rgba(255,140,0,0.4); }
  .key-opt .sub { font-family: 'Fira Code', monospace; font-size: 0.6rem; color: var(--muted); margin-top: 6px; letter-spacing: 1px; position: relative; z-index: 1; }
  .key-opt.active .sub { color: rgba(255,140,0,0.6); }
  .key-opt .badge {
    display: inline-block; margin-top: 8px; padding: 2px 8px; border-radius: 2px;
    font-family: 'Fira Code', monospace; font-size: 0.55rem; letter-spacing: 1px; text-transform: uppercase;
    border: 1px solid rgba(255,140,0,0.2); color: var(--muted); position: relative; z-index: 1; transition: all 0.2s;
  }
  .key-opt.active .badge { border-color: rgba(255,140,0,0.4); color: var(--accent); }

  .btn-gen {
    width: 100%; padding: 16px; background: transparent;
    border: 1px solid var(--accent); border-radius: 4px; color: var(--accent);
    font-family: 'Fira Code', monospace; font-size: 0.85rem; font-weight: 600;
    letter-spacing: 3px; text-transform: uppercase; cursor: pointer; transition: all 0.2s;
    position: relative; overflow: hidden;
  }
  .btn-gen::before { content: ''; position: absolute; inset: 0; background: var(--accent); transform: translateX(-100%); transition: transform 0.25s ease; }
  .btn-gen:hover::before { transform: translateX(0); }
  .btn-gen:hover { color: #000; }
  .btn-gen:active { transform: scale(0.99); }
  .btn-gen:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn-gen:disabled::before { display: none; }
  .btn-gen span { position: relative; z-index: 1; }

  .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid currentColor; border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .result { margin-top: 20px; display: none; animation: fadeIn 0.3s ease; }
  .result.show { display: block; }
  .result-inner { border: 1px solid rgba(48,209,88,0.3); border-radius: 4px; padding: 16px; background: rgba(48,209,88,0.04); display: flex; align-items: center; gap: 12px; }
  .result-url { flex: 1; font-family: 'Fira Code', monospace; font-size: 0.75rem; color: var(--green); word-break: break-all; line-height: 1.5; }
  .btn-open { flex-shrink: 0; padding: 8px 14px; background: rgba(48,209,88,0.12); border: 1px solid rgba(48,209,88,0.35); border-radius: 3px; color: var(--green); font-family: 'Fira Code', monospace; font-size: 0.7rem; font-weight: 600; cursor: pointer; letter-spacing: 1px; transition: all 0.2s; white-space: nowrap; }
  .btn-open:hover { background: rgba(48,209,88,0.22); }

  .error { margin-top: 16px; padding: 14px 16px; background: rgba(255,59,48,0.07); border: 1px solid rgba(255,59,48,0.25); border-radius: 4px; font-family: 'Fira Code', monospace; font-size: 0.75rem; color: var(--red); display: none; line-height: 1.5; }
  .error.show { display: block; animation: fadeIn 0.3s ease; }

  .footer-tag { margin-top: 20px; font-family: 'Fira Code', monospace; font-size: 0.58rem; color: var(--muted); letter-spacing: 1.5px; text-align: center; opacity: 0.5; }
</style>
</head>
<body>

<div class="wrap">
  <span class="corner-br"></span>
  <span class="corner-bl"></span>
  <div class="card">

    <div class="header">
      <span class="sys-tag">// key-system v2</span>
      <div class="logo">Fake<em>Lag</em></div>
      <div class="tagline">&gt; select duration and generate access key</div>
    </div>

    <div class="div"></div>

    <span class="label">// loại key</span>
    <div class="key-grid">
      <div class="key-opt active" id="opt12" onclick="selectType(12)">
        <div class="hours">12H</div>
        <div class="sub">1 nhiệm vụ</div>
        <div class="badge">FREE</div>
      </div>
      <div class="key-opt" id="opt24" onclick="selectType(24)">
        <div class="hours">24H</div>
        <div class="sub">2 nhiệm vụ</div>
        <div class="badge">CUSTOM</div>
      </div>
    </div>

    <button class="btn-gen" id="btnGen" onclick="handleGen()">
      <span id="btnText">[ GENERATE KEY ]</span>
    </button>

    <div class="error" id="errBox"></div>

    <div class="result" id="resultBox">
      <div class="result-inner">
        <div class="result-url" id="resultUrl"></div>
        <button class="btn-open" onclick="goLink()">MỞ →</button>
      </div>
    </div>

  </div>
</div>

<div class="footer-tag">FakeLag KEY SYSTEM — AUTHORIZED ACCESS ONLY</div>

<script>
  let selectedType = 12;
  let finalUrl     = "";

  function selectType(h) {
    selectedType = h;
    document.getElementById('opt12').classList.toggle('active', h === 12);
    document.getElementById('opt24').classList.toggle('active', h === 24);
    finalUrl = "";
    hide('errBox');
    document.getElementById('resultBox').classList.remove('show');
  }

  async function handleGen() {
    const btn  = document.getElementById('btnGen');
    const text = document.getElementById('btnText');
    btn.disabled = true;
    text.innerHTML = '<span class="spinner"></span>PROCESSING...';
    hide('errBox');
    document.getElementById('resultBox').classList.remove('show');

    try {
      const res  = await fetch(`/api/genkey?hours=${selectedType}`);
      const data = await res.json();
      if (!res.ok || !data.url) throw new Error(data.message || "server_error");
      finalUrl = data.url;
      document.getElementById('resultUrl').textContent = finalUrl;
      document.getElementById('resultBox').classList.add('show');
    } catch (e) {
      showErr("ERR // " + (e.message || "Không thể tạo key. Thử lại!"));
    } finally {
      btn.disabled = false;
      text.textContent = '[ Tạo Key ]';
    }
  }

  function goLink()     { if (finalUrl) window.open(finalUrl, '_blank'); }
  function showErr(msg) { const el = document.getElementById('errBox'); el.textContent = msg; el.classList.add('show'); }
  function hide(id)     { document.getElementById(id).classList.remove('show'); }
</script>
</body>
</html>
