<!doctype html>
<html lang="vi">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>MinhMod — Key Của Bạn</title>
		<link
			href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@600&display=swap"
			rel="stylesheet"
		/>
		<style>
			:root {
				--primary: #edd988;
				--primary-dim: #c8b85e;
				--primary-glow: rgba(237, 217, 136, 0.25);
				--primary-tint: rgba(237, 217, 136, 0.08);
				--bg: #131108;
				--surface: #1d1a0e;
				--surface-cont: #252118;
				--surface-high: #2e2a1c;
				--on-surface: #ede3c6;
				--on-surface-var: #9e9474;
				--outline: rgba(237, 217, 136, 0.18);
				--success: #7bd98a;
				--m3: cubic-bezier(0.2, 0, 0, 1);
				--bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
			}

			*,
			*::before,
			*::after {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}

			body {
				background: var(--bg);
				color: var(--on-surface);
				font-family: "DM Sans", sans-serif;
				min-height: 100vh;
				display: flex;
				align-items: center;
				justify-content: center;
				overflow: hidden;
				position: relative;
			}

			body::before {
				content: "";
				position: fixed;
				inset: 0;
				background:
					radial-gradient(
						ellipse 60% 40% at 20% 80%,
						rgba(237, 217, 136, 0.07) 0%,
						transparent 70%
					),
					radial-gradient(
						ellipse 40% 60% at 80% 20%,
						rgba(237, 217, 136, 0.05) 0%,
						transparent 70%
					);
				pointer-events: none;
				z-index: 0;
			}

			/* ── Particles ── */
			.particles {
				position: fixed;
				inset: 0;
				pointer-events: none;
				z-index: 1;
				overflow: hidden;
			}
			.particle {
				position: absolute;
				border-radius: 50%;
				background: var(--primary);
				animation: floatUp linear infinite;
				opacity: 0;
			}
			@keyframes floatUp {
				0% {
					transform: translateY(110vh) scale(0);
					opacity: 0;
				}
				10% {
					opacity: 0.3;
				}
				90% {
					opacity: 0.1;
				}
				100% {
					transform: translateY(-10vh) scale(1.5);
					opacity: 0;
				}
			}

			/* ── Confetti burst ── */
			.confetti-wrap {
				position: fixed;
				inset: 0;
				pointer-events: none;
				z-index: 1;
			}
			.confetti-piece {
				position: absolute;
				top: 40%;
				left: 50%;
				width: 8px;
				height: 8px;
				border-radius: 2px;
				animation: confettiBurst 1.2s var(--m3) forwards;
				opacity: 0;
			}
			@keyframes confettiBurst {
				0% {
					transform: translate(-50%, -50%) scale(0) rotate(0deg);
					opacity: 1;
				}
				60% {
					opacity: 1;
				}
				100% {
					opacity: 0;
				}
			}

			/* ── Curtain Split Entrance ── */
			.curtain-half {
				position: fixed;
				left: 0;
				width: 100%;
				z-index: 9999;
				overflow: hidden;
			}
			.curtain-top {
				top: 0;
				height: 50vh;
				background: linear-gradient(
					160deg,
					#f5e89a 0%,
					#edd988 40%,
					#c8b85e 100%
				);
				animation: curtainUp 0.72s 0.15s cubic-bezier(0.76, 0, 0.24, 1)
					both;
			}
			.curtain-bottom {
				bottom: 0;
				height: 50vh;
				background: linear-gradient(
					340deg,
					#f5e89a 0%,
					#edd988 40%,
					#c8b85e 100%
				);
				animation: curtainDown 0.72s 0.15s
					cubic-bezier(0.76, 0, 0.24, 1) both;
			}
			.curtain-top::after,
			.curtain-bottom::after {
				content: "";
				position: absolute;
				top: 0;
				left: -80%;
				width: 50%;
				height: 100%;
				background: linear-gradient(
					90deg,
					transparent,
					rgba(255, 255, 255, 0.35),
					transparent
				);
				animation: curtainShine 0.55s 0.05s ease-out forwards;
			}
			.curtain-top::before {
				content: "";
				position: absolute;
				bottom: 0;
				left: 0;
				width: 100%;
				height: 2px;
				background: linear-gradient(
					90deg,
					transparent,
					rgba(255, 255, 255, 0.8),
					transparent
				);
			}
			.curtain-bottom::before {
				content: "";
				position: absolute;
				top: 0;
				left: 0;
				width: 100%;
				height: 2px;
				background: linear-gradient(
					90deg,
					transparent,
					rgba(255, 255, 255, 0.8),
					transparent
				);
			}
			@keyframes curtainUp {
				from {
					transform: translateY(0);
				}
				to {
					transform: translateY(-105%);
				}
			}
			@keyframes curtainDown {
				from {
					transform: translateY(0);
				}
				to {
					transform: translateY(105%);
				}
			}
			@keyframes curtainShine {
				to {
					left: 130%;
				}
			}

			/* ── Main ── */
			.main-content {
				width: 100%;
				max-width: 400px;
				padding: 20px;
				position: relative;
				z-index: 2;
				opacity: 0;
				animation: revealCard 0.9s 0.7s var(--bounce) forwards;
			}
			@keyframes revealCard {
				from {
					opacity: 0;
					transform: translateY(32px) scale(0.92);
				}
				to {
					opacity: 1;
					transform: translateY(0) scale(1);
				}
			}

			/* ── Card ── */
			.card {
				background: var(--surface-cont);
				border-radius: 32px;
				border: 1px solid var(--outline);
				padding: 36px 28px 28px;
				text-align: center;
				box-shadow:
					0 0 0 1px rgba(237, 217, 136, 0.04),
					0 8px 32px rgba(0, 0, 0, 0.5),
					0 0 60px rgba(237, 217, 136, 0.06);
				position: relative;
				overflow: hidden;
			}
			.card::before {
				content: "";
				position: absolute;
				top: 0;
				left: 10%;
				right: 10%;
				height: 1px;
				background: linear-gradient(
					90deg,
					transparent,
					var(--primary),
					transparent
				);
				opacity: 0.5;
			}

			/* ── Success Icon ── */
			.success-icon {
				width: 64px;
				height: 64px;
				border-radius: 50%;
				background: linear-gradient(
					135deg,
					rgba(237, 217, 136, 0.15),
					rgba(237, 217, 136, 0.05)
				);
				border: 2px solid rgba(237, 217, 136, 0.3);
				display: flex;
				align-items: center;
				justify-content: center;
				margin: 0 auto 16px;
				font-size: 1.8rem;
				animation:
					iconPop 0.5s 2.8s var(--bounce) both,
					iconGlow 2s 3.5s ease infinite;
			}
			@keyframes iconPop {
				from {
					transform: scale(0) rotate(-20deg);
					opacity: 0;
				}
				to {
					transform: scale(1) rotate(0deg);
					opacity: 1;
				}
			}
			@keyframes iconGlow {
				0%,
				100% {
					box-shadow: 0 0 0 0 rgba(237, 217, 136, 0);
				}
				50% {
					box-shadow: 0 0 20px 4px rgba(237, 217, 136, 0.2);
				}
			}

			.title {
				font-family: "Playfair Display", serif;
				font-size: 1.6rem;
				font-weight: 900;
				color: var(--on-surface);
				margin-bottom: 6px;
				animation: staggerIn 0.5s 2.9s var(--m3) both;
			}

			.subtitle {
				font-size: 0.82rem;
				color: var(--on-surface-var);
				margin-bottom: 24px;
				animation: staggerIn 0.5s 3s var(--m3) both;
			}

			/* ── Key Display ── */
			.key-box {
				background: var(--surface-high);
				border: 1px solid rgba(237, 217, 136, 0.22);
				border-radius: 20px;
				padding: 22px 18px;
				margin-bottom: 8px;
				position: relative;
				animation: staggerIn 0.5s 3.1s var(--m3) both;
				transition: box-shadow 0.3s var(--m3);
			}
			.key-box:hover {
				box-shadow: 0 0 24px rgba(237, 217, 136, 0.12);
			}

			.key-label {
				font-size: 0.7rem;
				letter-spacing: 2px;
				text-transform: uppercase;
				color: var(--on-surface-var);
				margin-bottom: 10px;
				display: flex;
				align-items: center;
				justify-content: center;
				gap: 6px;
			}
			.key-label::before,
			.key-label::after {
				content: "";
				flex: 1;
				height: 1px;
				background: linear-gradient(90deg, transparent, var(--outline));
			}
			.key-label::after {
				background: linear-gradient(90deg, var(--outline), transparent);
			}

			.key-text {
				font-family: "JetBrains Mono", monospace;
				font-size: 1.1rem;
				font-weight: 600;
				color: var(--primary);
				letter-spacing: 3px;
				word-break: break-all;
				line-height: 1.5;
				animation: keyReveal 1.5s 3.3s var(--m3) both;
			}
			@keyframes keyReveal {
				from {
					opacity: 0;
					filter: blur(8px);
					letter-spacing: 8px;
				}
				to {
					opacity: 1;
					filter: blur(0);
					letter-spacing: 3px;
				}
			}

			/* ── Expiry chip ── */
			.expiry-chip {
				display: inline-flex;
				align-items: center;
				gap: 5px;
				padding: 5px 12px;
				border-radius: 100px;
				background: rgba(237, 217, 136, 0.08);
				border: 1px solid rgba(237, 217, 136, 0.15);
				font-size: 0.75rem;
				color: var(--primary-dim);
				margin-bottom: 20px;
				animation: staggerIn 0.5s 3.2s var(--m3) both;
			}

			/* ── Buttons ── */
			.btn-copy {
				width: 100%;
				padding: 16px;
				border: none;
				border-radius: 100px;
				background: rgba(237, 217, 136, 0.12);
				border: 1px solid rgba(237, 217, 136, 0.2);
				color: var(--primary);
				font-family: "DM Sans", sans-serif;
				font-size: 0.95rem;
				font-weight: 600;
				cursor: pointer;
				margin-bottom: 10px;
				position: relative;
				overflow: hidden;
				transition:
					background 0.3s var(--m3),
					transform 0.2s,
					box-shadow 0.3s;
				animation: staggerIn 0.5s 1.35s var(--m3) both;
			}
			.btn-copy:hover {
				background: rgba(237, 217, 136, 0.18);
				box-shadow: 0 4px 16px rgba(237, 217, 136, 0.15);
				transform: translateY(-1px);
			}
			.btn-copy.copied {
				background: rgba(123, 217, 138, 0.15);
				border-color: rgba(123, 217, 138, 0.3);
				color: var(--success);
			}

			.btn-back {
				width: 100%;
				padding: 16px;
				border: none;
				border-radius: 100px;
				background: var(--primary);
				color: #1a1600;
				font-family: "DM Sans", sans-serif;
				font-size: 0.95rem;
				font-weight: 700;
				cursor: pointer;
				position: relative;
				overflow: hidden;
				transition:
					transform 0.2s var(--m3),
					box-shadow 0.3s var(--m3),
					filter 0.3s;
				animation: staggerIn 0.5s 1.5s var(--m3) both;
			}
			.btn-back:hover {
				transform: translateY(-2px);
				box-shadow: 0 8px 24px rgba(237, 217, 136, 0.4);
				filter: brightness(1.08);
			}
			.btn-back:active {
				transform: scale(0.97);
			}

			/* ripple */
			.ripple {
				position: absolute;
				border-radius: 50%;
				background: rgba(255, 255, 255, 0.35);
				width: 10px;
				height: 10px;
				transform: scale(0);
				pointer-events: none;
				animation: rippleAnim 0.6s linear;
			}
			@keyframes rippleAnim {
				to {
					transform: scale(40);
					opacity: 0;
				}
			}

			@keyframes staggerIn {
				from {
					opacity: 0;
					transform: translateY(10px);
				}
				to {
					opacity: 1;
					transform: translateY(0);
				}
			}

			/* ── Toast ── */
			.toast {
				position: fixed;
				bottom: 32px;
				left: 50%;
				transform: translateX(-50%) translateY(20px);
				background: var(--surface-high);
				color: var(--on-surface);
				padding: 12px 24px;
				border-radius: 100px;
				font-size: 0.85rem;
				font-weight: 500;
				border: 1px solid var(--outline);
				box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
				opacity: 0;
				pointer-events: none;
				transition:
					opacity 0.3s var(--m3),
					transform 0.3s var(--m3);
				z-index: 1000;
				white-space: nowrap;
			}
			.toast.show {
				opacity: 1;
				transform: translateX(-50%) translateY(0);
			}
			.footer {
				margin-top: 20px;
				padding-top: 16px;
				border-top: 1px solid var(--outline);
				display: flex;
				justify-content: center;
				align-items: center;
				gap: 8px;
				font-size: 0.75rem;
				color: var(--on-surface-var);
			}
			.footer a {
				color: var(--primary);
				text-decoration: none;
			}
			.footer a:hover {
				text-decoration: underline;
			}
		</style>
	</head>
	<body>
		<div class="particles" id="particles"></div>
		<div class="confetti-wrap" id="confetti"></div>

		<!-- Curtain Split Entrance -->
		<div class="curtain-half curtain-top"></div>
		<div class="curtain-half curtain-bottom"></div>

		<div class="main-content">
			<div class="card">
				<div class="success-icon">✦</div>

				<div class="title">Thành công!</div>
				<div class="subtitle">Key của bạn đã sẵn sàng sử dụng</div>

				<div class="key-box">
					<div class="key-label">Key của bạn</div>
					<div class="key-text" id="keyText">Không có key</div>
				</div>

				<div class="expiry-chip">
					⏱ Hết hạn sau 5 giờ kể từ khi kích hoạt
				</div>

				<button class="btn-copy" id="copyBtn" onclick="copyKey(event)">
					⎘ &nbsp;Sao chép Key
				</button>
				<button class="btn-back" onclick="goBack(event)">
					← &nbsp;Quay lại trang chủ
				</button>
				<div class="footer">
					<span>© 2025 UserMinhMod</span>
					<span>·</span>
					<span>All rights reserved</span>
				</div>
			</div>
		</div>

		<div class="toast" id="toast"></div>

		<script>
			/* ── Get key from URL ── */
			const params = new URLSearchParams(window.location.search);
			const keyFromUrl = params.get("k") || params.get("key");
			if (keyFromUrl)
				document.getElementById("keyText").textContent = keyFromUrl;

			/* ── Particles ── */
			const pContainer = document.getElementById("particles");
			for (let i = 0; i < 28; i++) {
				const p = document.createElement("div");
				p.className = "particle";
				const s = Math.random() * 5 + 2;
				p.style.cssText = `width:${s}px;height:${s}px;left:${Math.random() * 100}%;
        animation-duration:${6 + Math.random() * 10}s;animation-delay:${Math.random() * 12}s;`;
				pContainer.appendChild(p);
			}

			/* ── Bubbles ── */
			const loader = document.getElementById("loader");
			for (let i = 0; i < 24; i++) {
				const b = document.createElement("div");
				b.className = "bubble";
				const s = Math.random() * 18 + 6;
				b.style.cssText = `width:${s}px;height:${s}px;left:${Math.random() * 100}%;
        animation-duration:${0.8 + Math.random() * 1.2}s;animation-delay:${Math.random() * 2}s;`;
				loader.appendChild(b);
			}

			/* ── Confetti burst on load ── */
			const colors = [
				"#EDD988",
				"#C8B85E",
				"#7BD98A",
				"#FFF",
				"#F4A460",
				"#ADD8E6"
			];
			setTimeout(() => {
				const conf = document.getElementById("confetti");
				for (let i = 0; i < 40; i++) {
					const c = document.createElement("div");
					c.className = "confetti-piece";
					const angle = (i / 40) * 360;
					const dist = 80 + Math.random() * 120;
					const rad = (angle * Math.PI) / 180;
					const tx = Math.cos(rad) * dist;
					const ty = Math.sin(rad) * dist - 80;
					c.style.cssText = `
          background:${colors[i % colors.length]};
          animation-delay:${Math.random() * 0.3}s;
          animation-duration:${0.8 + Math.random() * 0.6}s;
        `;
					c.style.setProperty("--tx", tx + "px");
					c.style.setProperty("--ty", ty + "px");
					c.style.animation = `confettiBurst ${0.8 + Math.random() * 0.5}s var(--m3) ${Math.random() * 0.3}s forwards`;
					c.style.transform = `translate(-50%,-50%)`;

					// manual keyframes via inline transform animation trick
					c.animate(
						[
							{
								transform: `translate(-50%,-50%) scale(0) rotate(0deg)`,
								opacity: 1
							},
							{
								transform: `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px)) scale(1) rotate(${angle * 2}deg)`,
								opacity: 0.8,
								offset: 0.6
							},
							{
								transform: `translate(calc(-50% + ${tx}px), calc(-50% + ${ty + 40}px)) scale(0.5) rotate(${angle * 3}deg)`,
								opacity: 0
							}
						],
						{
							duration: 800 + Math.random() * 500,
							delay: Math.random() * 300,
							fill: "forwards",
							easing: "cubic-bezier(0.2,0,0,1)"
						}
					);

					conf.appendChild(c);
				}
				setTimeout(() => (conf.innerHTML = ""), 2000);
			}, 2800);

			/* ── Ripple ── */
			function addRipple(btn, e) {
				const r = document.createElement("span");
				r.className = "ripple";
				const rect = btn.getBoundingClientRect();
				r.style.left = e.clientX - rect.left - 5 + "px";
				r.style.top = e.clientY - rect.top - 5 + "px";
				btn.appendChild(r);
				setTimeout(() => r.remove(), 650);
			}

			/* ── Toast ── */
			function showToast(msg) {
				const t = document.getElementById("toast");
				t.textContent = msg;
				t.classList.add("show");
				setTimeout(() => t.classList.remove("show"), 2800);
			}

			/* ── Copy ── */
			function copyKey(e) {
				addRipple(document.getElementById("copyBtn"), e);
				const text = document.getElementById("keyText").textContent;
				navigator.clipboard
					.writeText(text)
					.then(() => {
						const btn = document.getElementById("copyBtn");
						btn.innerHTML = "✓ &nbsp;Đã sao chép!";
						btn.classList.add("copied");
						showToast("✓ Đã sao chép key vào clipboard");
						setTimeout(() => {
							btn.innerHTML = "⎘ &nbsp;Sao chép Key";
							btn.classList.remove("copied");
						}, 2500);
					})
					.catch(() =>
						showToast("Không thể sao chép, hãy thử thủ công")
					);
			}

			/* ── Back ── */
			function goBack(e) {
				addRipple(
					document.getElementById("generateBtn") || e.target,
					e
				);
				window.location.href = "/";
			}
		</script>
	</body>
</html>
